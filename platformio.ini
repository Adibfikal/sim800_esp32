; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Upload options
upload_speed = 921600

; Monitor options
monitor_rts = 0
monitor_dtr = 0

; Library dependencies
lib_deps = 
    ; Add any additional libraries here if needed
    ; For example: PubSubClient for advanced MQTT functionality

; Advanced options
board_build.partitions = default.csv

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Upload options
upload_speed = 921600

; Monitor options
monitor_rts = 0
monitor_dtr = 0

; Library dependencies
lib_deps = 
    ; Add any additional libraries here if needed

; Advanced options
board_build.partitions = default.csv

[env:esp32-wroom-32]
platform = espressif32
board = esp32-wroom-32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags = 
    -DCORE_DEBUG_LEVEL=1

; Upload options
upload_speed = 921600

; Monitor options
monitor_rts = 0
monitor_dtr = 0

; Library dependencies
lib_deps = 
    ; Add libraries as needed

; Custom settings for different scenarios
[env:debug]
extends = env:esp32dev
build_type = debug
build_flags = 
    ${env:esp32dev.build_flags}
    -DDEBUG_ENABLED=1
    -DDEBUG_AT_COMMANDS=1
    -DDEBUG_GPS=1
    -DDEBUG_HTTP=1
    -DDEBUG_MQTT=1

[env:release]
extends = env:esp32dev
build_type = release
build_flags = 
    ${env:esp32dev.build_flags}
    -DDEBUG_ENABLED=0
    -O2